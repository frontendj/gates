<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gates</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <p class="eyebrow">Photo notes</p>
      <h1>Gates</h1>
      <p class="intro">
        A small collection of gates built to let certain passers-by through, such as people,
        dogs, or cars, while keeping animals like goats, cows, or horses out.
      </p>
    </header>

    <main>
      <section class="gallery" id="gallery" aria-live="polite"></section>
      <p class="empty-state" id="empty-state" hidden>No photos yet.</p>

      <section class="detail" id="detail" aria-live="polite" hidden>
        <div class="detail__media">
          <div class="detail__image-frame" id="detail-image-frame">
            <img class="detail__image" id="detail-image" alt="">
          </div>
          <div class="detail__mini-gallery" id="detail-mini-gallery" aria-label="Photos in this group"></div>
        </div>
        <aside class="detail__notes">
          <div class="detail__controls">
            <button class="detail__nav" type="button" id="previous-group" aria-label="Previous gate">
              Previous
            </button>
            <button class="detail__nav" type="button" id="next-group" aria-label="Next gate">
              Next
            </button>
          </div>
          <div id="detail-copy"></div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
